name: deploy-quantwhisper

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "40 23 * * *"

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build site assets
        run: |
          python scripts/prepare_site.py
          cp index.html site/index.html
          touch site/.nojekyll
          date -u +%Y-%m-%dT%H:%M:%SZ > site/build-utc.txt

      - name: Deploy to GitHub Pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
